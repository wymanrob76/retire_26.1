<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AuraRetire">
  <meta name="theme-color" content="#070B14">
  <title>AuraRetire</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- Firebase compat SDK — no module syntax, works on all mobile browsers -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <style>
    /* ── Reset & base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #070B14;
      --surface:     #0F1623;
      --surface-2:   #161E2E;
      --border:      #1C2A40;
      --primary:     #5B6CF9;
      --primary-dim: rgba(91,108,249,0.15);
      --success:     #22C55E;
      --warn:        #F59E0B;
      --danger:      #EF4444;
      --text:        #EFF2F7;
      --text-dim:    #94A3B8;
      --text-mute:   #4B6080;

      --top-bar:    56px;
      --bottom-nav: 64px;
      --radius:     12px;
      --gap:        12px;
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Auth screen ────────────────────────────────────────────────────── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      padding: 32px 24px;
      gap: 12px;
      background: radial-gradient(ellipse at 50% 30%, rgba(91,108,249,0.12) 0%, transparent 70%), var(--bg);
    }

    .auth-mark {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--primary-dim);
      border: 1px solid rgba(91,108,249,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .auth-mark svg { width: 36px; height: 36px; }

    .auth-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .auth-sub {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 24px;
    }

    #sign-in-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
      justify-content: center;
    }

    #sign-in-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    #auth-msg {
      font-size: 13px;
      color: var(--danger);
      min-height: 18px;
      text-align: center;
    }

    /* ── App shell ──────────────────────────────────────────────────────── */
    #app-screen {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Top bar ────────────────────────────────────────────────────────── */
    .top-bar {
      height: var(--top-bar);
      padding: 0 16px;
      padding-top: env(safe-area-inset-top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-logo {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--primary-dim);
      border: 1px solid rgba(91,108,249,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .top-logo svg { width: 16px; height: 16px; }

    .top-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    #user-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--primary-dim);
      border: 1px solid rgba(91,108,249,0.4);
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #theme-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #theme-btn:active { opacity: 0.7; }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── User menu ──────────────────────────────────────────────────────── */
    #user-menu {
      position: fixed;
      top: calc(var(--top-bar) + 8px);
      right: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      z-index: 100;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    #menu-name  { font-size: 14px; font-weight: 600; }
    #menu-email { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }

    #sign-out-btn {
      width: 100%;
      padding: 9px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── View container ─────────────────────────────────────────────────── */
    #view-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
    }

    .view-pad {
      padding: 14px 14px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
    }

    /* ── Bottom nav ─────────────────────────────────────────────────────── */
    .bottom-nav {
      height: var(--bottom-nav);
      padding-bottom: env(safe-area-inset-bottom);
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-mute);
      transition: color 0.15s;
      padding-bottom: 2px;
    }

    .nav-btn.active { color: var(--primary); }
    .nav-btn:active { opacity: 0.7; }

    .nav-icon { font-size: 18px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.2px; }

    /* ── Cards ──────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: var(--gap);
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .card-sub { font-size: 11px; color: var(--text-mute); font-weight: 400; text-transform: none; letter-spacing: 0; }

    /* ── Hero card ──────────────────────────────────────────────────────── */
    .hero-card {
      text-align: center;
      padding: 24px 16px 20px;
      background: linear-gradient(135deg, var(--surface) 0%, rgba(91,108,249,0.08) 100%);
    }

    .hero-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .hero-number { font-size: 56px; font-weight: 800; letter-spacing: -2px; color: var(--text); line-height: 1; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
    .hero-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 0; }

    /* ── Stat row ───────────────────────────────────────────────────────── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 3px;
      text-align: center;
    }

    .stat-val {
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .stat-val.accent, .stat.accent .stat-val { color: var(--primary); }

    .stat-lbl {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .text-success { color: var(--success) !important; }
    .text-danger  { color: var(--danger)  !important; }
    .text-warn    { color: var(--warn)    !important; }
    .text-dim     { color: var(--text-dim); }

    /* ── Runway bar ─────────────────────────────────────────────────────── */
    .runway {
      display: flex;
      gap: 2px;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .runway-seg { flex: 1; border-radius: 2px; }
    .seg-ok    { background: var(--success); }
    .seg-low   { background: var(--warn); }
    .seg-empty { background: rgba(239,68,68,0.3); }

    .runway-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-mute);
    }

    /* ── Badges ─────────────────────────────────────────────────────────── */
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .badge-ok   { background: rgba(34,197,94,0.15);  color: var(--success); }
    .badge-warn { background: rgba(245,158,11,0.15); color: var(--warn); }

    /* ── Income list ────────────────────────────────────────────────────── */
    .income-list { display: flex; flex-direction: column; gap: 10px; }

    .income-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .income-lbl { font-size: 13px; color: var(--text-dim); }
    .income-val { font-size: 13px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; white-space: nowrap; }

    /* ── Monte Carlo dashboard card ─────────────────────────────────────── */
    .card-action { cursor: pointer; text-align: center; padding: 20px 16px; }
    .card-action:active { opacity: 0.8; }

    .mc-big {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }

    .mc-hero {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .mc-success { color: var(--success); }
    .mc-warn    { color: var(--warn); }
    .mc-danger  { color: var(--danger); }
    .mc-dim     { color: var(--text-mute); }

    .mc-label { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
    .mc-progress { font-size: 13px; color: var(--text-dim); margin-top: 8px; min-height: 18px; }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      letter-spacing: 0.2px;
    }

    .btn-primary:active { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toggle group ───────────────────────────────────────────────────── */
    .toggle-group {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px;
      gap: 2px;
    }

    .toggle-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      background: none;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .toggle-btn.active {
      background: var(--primary);
      color: white;
    }

    /* ── SS compare ─────────────────────────────────────────────────────── */
    .ss-compare {
      display: flex;
      align-items: center;
      justify-content: space-around;
      gap: 12px;
      margin-top: 4px;
    }

    .ss-col { text-align: center; }
    .ss-age { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
    .ss-amt { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .ss-divider { font-size: 12px; color: var(--text-mute); }

    /* ── Chart cards ────────────────────────────────────────────────────── */
    .chart-card canvas { width: 100% !important; }

    /* ── Timeline ───────────────────────────────────────────────────────── */
    .timeline { display: flex; flex-direction: column; gap: 0; position: relative; padding-left: 12px; }

    .timeline::before {
      content: '';
      position: absolute;
      left: 21px;
      top: 16px;
      bottom: 16px;
      width: 1px;
      background: var(--border);
    }

    .tl-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      position: relative;
    }

    .tl-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      border: 1px solid var(--border);
    }

    .tl-now    .tl-icon { background: var(--primary-dim); color: var(--primary); border-color: rgba(91,108,249,0.4); }
    .tl-raise  .tl-icon { background: rgba(34,197,94,0.1); color: var(--success); border-color: rgba(34,197,94,0.3); }
    .tl-invest .tl-icon { background: rgba(34,211,238,0.1); color: #22D3EE; border-color: rgba(34,211,238,0.3); }
    .tl-retire .tl-icon { background: rgba(91,108,249,0.2); color: var(--primary); border-color: rgba(91,108,249,0.5); }
    .tl-house  .tl-icon { background: rgba(245,158,11,0.1); color: var(--warn); border-color: rgba(245,158,11,0.3); }
    .tl-ss     .tl-icon { background: rgba(34,197,94,0.15); color: var(--success); border-color: rgba(34,197,94,0.4); }
    .tl-target .tl-icon { background: rgba(148,163,184,0.1); color: var(--text-dim); }

    .tl-body { flex: 1; }
    .tl-age   { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
    .tl-label { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .tl-detail { font-size: 12px; color: var(--text-dim); line-height: 1.4; }

    /* ── Settings ───────────────────────────────────────────────────────── */
    .setting-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: var(--gap);
      overflow: hidden;
    }

    .setting-group summary {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-tap-highlight-color: transparent;
    }

    .setting-group summary::after {
      content: '›';
      font-size: 18px;
      color: var(--text-mute);
      transition: transform 0.2s;
    }

    .setting-group[open] summary::after { transform: rotate(90deg); }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      border-top: 1px solid var(--border);
      gap: 12px;
    }

    .field-label {
      font-size: 13px;
      color: var(--text-dim);
      flex: 1;
    }

    .setting-input {
      width: 110px;
      padding: 7px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      text-align: right;
      font-variant-numeric: tabular-nums;
      -moz-appearance: textfield;
    }

    .setting-input::-webkit-inner-spin-button,
    .setting-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .setting-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .field-note {
      font-size: 11px;
      color: var(--text-mute);
      padding: 8px 16px 12px;
      border-top: 1px solid var(--border);
      line-height: 1.5;
    }

    /* ── Settings footer ────────────────────────────────────────────────── */
    .settings-footer { margin-top: 4px; }
    #save-status { font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
    .save-ok  { color: var(--success); }
    .save-err { color: var(--danger); }
    .save-unsaved { color: var(--warn); }

    /* ── Info card ──────────────────────────────────────────────────────── */
    .info-card { background: rgba(91,108,249,0.06); border-color: rgba(91,108,249,0.2); }
    .info-title { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .info-body  { font-size: 12px; color: var(--text-dim); line-height: 1.6; }

    /* ── Utility ────────────────────────────────────────────────────────── */
    [hidden] { display: none !important; }
  </style>
</head>

<body>

  <!-- ── Auth screen ──────────────────────────────────────────────────────── -->
  <div id="auth-screen">
    <div class="auth-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(91,108,249,0.9)" stroke-width="1.5">
        <polygon points="12,2 22,7 22,17 12,22 2,17 2,7"/>
        <line x1="12" y1="2" x2="12" y2="22"/>
        <line x1="2" y1="7" x2="22" y2="7"/>
        <line x1="2" y1="17" x2="22" y2="17"/>
      </svg>
    </div>
    <div class="auth-title">AuraRetire</div>
    <div class="auth-sub">Personal retirement planning</div>

    <button id="sign-in-btn">
      <!-- Google G -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <p id="auth-msg"></p>
  </div>

  <!-- ── App screen ───────────────────────────────────────────────────────── -->
  <div id="app-screen" hidden>

    <header class="top-bar">
      <div class="top-bar-left">
        <div class="top-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(91,108,249,0.9)" stroke-width="1.5">
            <polygon points="12,2 22,7 22,17 12,22 2,17 2,7"/>
            <line x1="12" y1="2" x2="12" y2="22"/>
          </svg>
        </div>
        <span class="top-title">AuraRetire</span>
      </div>
      <div class="top-bar-right">
        <button id="theme-btn" title="Toggle light/dark">☀</button>
        <button id="user-btn"><span id="user-initial">R</span></button>
      </div>
    </header>

    <!-- User menu -->
    <div id="user-menu" hidden>
      <div id="menu-name">User</div>
      <div id="menu-email"></div>
      <button id="sign-out-btn">Sign out</button>
    </div>

    <main id="view-container"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="dashboard">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Today</span>
      </button>
      <button class="nav-btn" data-view="projection">
        <span class="nav-icon">↗</span>
        <span class="nav-label">Growth</span>
      </button>
      <button class="nav-btn" data-view="outlook">
        <span class="nav-icon">◎</span>
        <span class="nav-label">Outlook</span>
      </button>
